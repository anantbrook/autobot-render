version: "3.8"

# ════════════════════════════════════════════════
# Auto Channel Bot — Docker Compose
# Start with: docker-compose up -d
# View logs:  docker-compose logs -f bot
# Stop:       docker-compose down
# ════════════════════════════════════════════════

services:
  bot:
    build: .
    container_name: auto_channel_bot
    restart: always                     # Auto-restart if it crashes
    volumes:
      - ./bot_data.db:/app/bot_data.db  # Persist the database
      - ./bot.log:/app/bot.log          # Persist logs
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.path.exists('bot_data.db') or exit(1)"]
      interval: 60s
      timeout: 10s
      retries: 3
